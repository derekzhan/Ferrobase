name: Release Ferrobase

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS Intel
            runner: macos-15-intel
            rust_targets: x86_64-apple-darwin
            tauri_args: --target x86_64-apple-darwin
          - name: macOS Apple Silicon
            runner: macos-15
            rust_targets: aarch64-apple-darwin
            tauri_args: --target aarch64-apple-darwin
          - name: Windows x64
            runner: ubuntu-latest
            rust_targets: x86_64-pc-windows-msvc
            tauri_args: --runner cargo-xwin --target x86_64-pc-windows-msvc
          - name: Windows ARM64
            runner: ubuntu-latest
            rust_targets: aarch64-pc-windows-msvc
            tauri_args: --runner cargo-xwin --target aarch64-pc-windows-msvc

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux cross-compilation dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y nsis lld llvm
          cargo install --locked cargo-xwin

      - name: Validate Apple signing secrets
        if: runner.os == 'macOS'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
        run: |
          required=(
            APPLE_CERTIFICATE
            APPLE_CERTIFICATE_PASSWORD
            KEYCHAIN_PASSWORD
            APPLE_API_ISSUER
            APPLE_API_KEY
            APPLE_API_KEY_P8
          )
          missing=()
          for var in "${required[@]}"; do
            if [ -z "${!var}" ]; then
              missing+=("$var")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "Missing required macOS signing secrets: ${missing[*]}"
            exit 1
          fi

      - name: Import Apple Developer certificate
        if: runner.os == 'macOS'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > "$RUNNER_TEMP/certificate.p12"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$RUNNER_TEMP/build.keychain"
          security default-keychain -s "$RUNNER_TEMP/build.keychain"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$RUNNER_TEMP/build.keychain"
          security set-keychain-settings -t 3600 -u "$RUNNER_TEMP/build.keychain"
          security import "$RUNNER_TEMP/certificate.p12" \
            -k "$RUNNER_TEMP/build.keychain" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$KEYCHAIN_PASSWORD" \
            "$RUNNER_TEMP/build.keychain"
          security find-identity -v -p codesigning "$RUNNER_TEMP/build.keychain"

      - name: Resolve Apple signing identity
        if: runner.os == 'macOS'
        run: |
          CERT_ID=$(
            security find-identity -v -p codesigning "$RUNNER_TEMP/build.keychain" |
            grep "Developer ID Application" |
            head -n 1 |
            awk -F '"' '{print $2}'
          )

          if [ -z "$CERT_ID" ]; then
            echo "Developer ID Application certificate not found in imported keychain."
            exit 1
          fi

          echo "APPLE_SIGNING_IDENTITY=$CERT_ID" >> "$GITHUB_ENV"

      - name: Write App Store Connect API key
        if: runner.os == 'macOS'
        env:
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
        run: |
          KEY_PATH="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY}.p8"
          printf '%s' "$APPLE_API_KEY_P8" > "$KEY_PATH"
          chmod 600 "$KEY_PATH"
          echo "APPLE_API_KEY_PATH=$KEY_PATH" >> "$GITHUB_ENV"

      - name: Install npm dependencies
        run: npm ci

      - name: Build and upload release assets
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_API_ISSUER: ${{ runner.os == 'macOS' && secrets.APPLE_API_ISSUER || '' }}
          APPLE_API_KEY: ${{ runner.os == 'macOS' && secrets.APPLE_API_KEY || '' }}
          APPLE_API_KEY_PATH: ${{ env.APPLE_API_KEY_PATH }}
          APPLE_SIGNING_IDENTITY: ${{ env.APPLE_SIGNING_IDENTITY }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Ferrobase ${{ github.ref_name }}
          releaseBody: |
            Automated release for ${{ github.ref_name }}.

            Included artifacts:
            - macOS Intel
            - macOS Apple Silicon
            - Windows x64
            - Windows ARM64
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.tauri_args }}
